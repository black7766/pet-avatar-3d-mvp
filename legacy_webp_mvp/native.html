<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PaiMomo 原生多帧动作</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #211b17;
      --muted: #776b62;
      --line: rgba(42, 32, 25, .12);
      --paper: #eee8df;
      --panel: rgba(255, 255, 255, .86);
      --native: #247a6b;
      --interp: #8b5a44;
      --shadow: 0 16px 42px rgba(48, 36, 28, .12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(115deg, rgba(36, 122, 107, .10), transparent 42%),
        linear-gradient(280deg, rgba(139, 90, 68, .10), transparent 38%),
        var(--paper);
      padding: 28px;
    }

    .page {
      width: min(1280px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 18px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: end;
    }

    h1 {
      margin: 0;
      font-size: clamp(26px, 3vw, 40px);
      line-height: 1.08;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 8px 0 0;
      max-width: 780px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .pill-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .pill {
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .78);
      color: var(--muted);
      padding: 9px 13px;
      font-size: 13px;
      white-space: nowrap;
      box-shadow: 0 8px 22px rgba(48, 36, 28, .06);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(320px, 1fr));
      gap: 14px;
    }

    .card {
      overflow: hidden;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: var(--shadow);
      min-width: 0;
    }

    .head {
      padding: 14px 14px 11px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .head strong {
      display: block;
      font-size: 18px;
      line-height: 1.25;
    }

    .head span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .tag {
      flex: 0 0 auto;
      border-radius: 999px;
      padding: 6px 9px;
      color: white;
      font-weight: 800;
      font-size: 12px;
      line-height: 1;
      background: var(--native);
    }

    .tag.interp { background: var(--interp); }

    .stage {
      position: relative;
      aspect-ratio: 1 / 1;
      background:
        linear-gradient(45deg, rgba(70, 62, 54, .05) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(70, 62, 54, .05) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(70, 62, 54, .05) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(70, 62, 54, .05) 75%),
        #fffaf3;
      background-size: 26px 26px;
      background-position: 0 0, 0 13px, 13px -13px, -13px 0;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .loading {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: var(--muted);
      background: rgba(255, 250, 243, .72);
      font-size: 13px;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      border-top: 1px solid var(--line);
    }

    .metric {
      padding: 11px 10px;
      border-right: 1px solid var(--line);
      min-width: 0;
      display: grid;
      gap: 4px;
    }

    .metric:last-child { border-right: 0; }

    .metric span {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.1;
    }

    .metric strong {
      font-size: 14px;
      line-height: 1.15;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .note {
      padding: 12px 14px 15px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
      min-height: 58px;
    }

    .summary {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, .86);
      padding: 16px;
      box-shadow: 0 12px 32px rgba(48, 36, 28, .08);
    }

    .summary h2 {
      margin: 0 0 8px;
      font-size: 17px;
    }

    .summary p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.75;
    }

    @media (max-width: 860px) {
      body { padding: 16px; }
      .topbar { align-items: flex-start; flex-direction: column; }
      .pill-row { justify-content: flex-start; }
      .grid { grid-template-columns: 1fr; }
      .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .metric:nth-child(2) { border-right: 0; }
      .metric:nth-child(-n + 2) { border-bottom: 1px solid var(--line); }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="topbar">
      <div>
        <h1>原生多帧动作 vs 插帧动作</h1>
        <p class="subtitle">
          这版不再靠插帧“猜中间帧”，而是用 image_gen 直接生成 24 张动作姿态，再本地裁帧、绿幕透明化、WebP 压缩和 Canvas 播放。
        </p>
      </div>
      <div class="pill-row">
        <span class="pill" id="assetCount">素材加载中</span>
        <span class="pill">AI 原生姿态</span>
        <span class="pill">Canvas 播放</span>
      </div>
    </header>

    <section class="grid" id="grid" aria-label="原生多帧动作对比"></section>

    <section class="summary">
      <h2>判断重点</h2>
      <p>
        如果原生 24 帧的动作观感明显比插帧 60fps 更像视频里的宠物，那后续就应该走“多生成动作关键帧”的生产线，而不是继续堆插帧。下一档可以做每个动作 48/72 张原生帧，但成本会按生图次数上升。
      </p>
    </section>
  </main>

  <script>
    const version = new URLSearchParams(location.search).get("v") || String(Date.now());
    const grid = document.getElementById("grid");
    const assetCount = document.getElementById("assetCount");
    const order = ["happy_native24", "happy_max60", "eat_native24", "eat_max60"];

    function formatBytes(bytes) {
      if (bytes > 1024 * 1024) return `${(bytes / 1024 / 1024).toFixed(2)} MB`;
      return `${Math.round(bytes / 1024)} KB`;
    }

    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const image = new Image();
        image.onload = () => resolve(image);
        image.onerror = () => reject(new Error(`Failed to load ${src}`));
        image.src = src;
      });
    }

    function frameUrl(item, index) {
      return `${item.frame_path.replace("{index}", String(index).padStart(2, "0"))}?v=${version}`;
    }

    async function loadFrames(item) {
      return Promise.all(
        Array.from({ length: item.frame_count }, (_, i) => loadImage(frameUrl(item, i + 1)))
      );
    }

    function drawContain(ctx, image) {
      const width = ctx.canvas.width;
      const height = ctx.canvas.height;
      ctx.clearRect(0, 0, width, height);
      const scale = Math.min(width / image.width, height / image.height);
      const drawW = image.width * scale;
      const drawH = image.height * scale;
      ctx.drawImage(image, (width - drawW) / 2, (height - drawH) / 2, drawW, drawH);
    }

    function cardTitle(item) {
      if (item.id.endsWith("native24")) return `${item.label} · 原生 24 帧`;
      return `${item.action_label} · 插帧 60fps`;
    }

    function cardNote(item) {
      if (item.id.endsWith("native24")) return item.note;
      return "这是上一版本地光流插帧结果，帧率更高，但中间姿态来自算法推断，不是 AI 原生绘制。";
    }

    function createCard(item) {
      const isNative = item.id.endsWith("native24");
      const card = document.createElement("article");
      card.className = "card";
      card.innerHTML = `
        <div class="head">
          <div>
            <strong>${cardTitle(item)}</strong>
            <span>${isNative ? "image_gen 生成动作源图" : "本地光流插帧"}</span>
          </div>
          <span class="tag ${isNative ? "" : "interp"}">${isNative ? "NATIVE" : "INTERP"}</span>
        </div>
        <div class="stage">
          <canvas width="520" height="520"></canvas>
          <div class="loading">加载帧序列</div>
        </div>
        <div class="metrics">
          <div class="metric"><span>帧数</span><strong>${item.frame_count}</strong></div>
          <div class="metric"><span>帧率</span><strong>${item.fps} fps</strong></div>
          <div class="metric"><span>时长</span><strong>${(item.duration_ms / 1000).toFixed(2)}s</strong></div>
          <div class="metric"><span>WebP</span><strong>${formatBytes(item.webp_size_bytes)}</strong></div>
        </div>
        <div class="note">${cardNote(item)}</div>
      `;
      grid.appendChild(card);
      return card;
    }

    async function runCard(item) {
      const card = createCard(item);
      const canvas = card.querySelector("canvas");
      const loading = card.querySelector(".loading");
      const ctx = canvas.getContext("2d");
      const frames = await loadFrames(item);
      loading.remove();
      drawContain(ctx, frames[0]);

      const start = performance.now();
      function tick(now) {
        const index = Math.floor((now - start) / item.frame_ms) % frames.length;
        drawContain(ctx, frames[index]);
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
      return frames.length;
    }

    async function init() {
      const [nativeManifest, compareManifest] = await Promise.all([
        fetch(`assets/native/manifest.json?v=${version}`).then((res) => res.json()),
        fetch(`assets/compare/manifest.json?v=${version}`).then((res) => res.json())
      ]);
      const items = [...nativeManifest, ...compareManifest];
      const byId = Object.fromEntries(items.map((item) => [item.id, item]));
      let total = 0;
      for (const id of order) {
        if (byId[id]) total += await runCard(byId[id]);
      }
      assetCount.textContent = `${total} 帧已加载`;
    }

    init().catch((error) => {
      console.error(error);
      grid.innerHTML = `<section class="summary"><h2>加载失败</h2><p>${error.message}</p></section>`;
      assetCount.textContent = "加载失败";
    });
  </script>
</body>
</html>
