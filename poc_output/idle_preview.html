<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>平视陪伴构图 idle 预览（v4 影视级+平视定稿）</title>
<style>
  body{font-family:-apple-system,"PingFang SC",sans-serif;background:#FFF7EE;margin:0;padding:28px;display:flex;flex-direction:column;align-items:center}
  h3{color:#3a2e22;margin:0 0 4px}
  .sub{color:#9a8c7c;font-size:13px;margin-bottom:18px}
  .row{display:flex;gap:36px;flex-wrap:wrap;justify-content:center}
  .slot{position:relative;width:420px;height:420px}
  .slot img{width:100%;height:100%;position:relative;z-index:2}
  .shadow{position:absolute;bottom:26px;left:50%;transform:translateX(-50%);width:48%;height:30px;
          background:radial-gradient(ellipse at center,rgba(60,40,20,.24),transparent 70%);
          border-radius:50%;z-index:1;animation:breath 2.8s ease-in-out infinite}
  @keyframes breath{0%,100%{transform:translateX(-50%) scaleX(1)}50%{transform:translateX(-50%) scaleX(1.07)}}
  .name{text-align:center;color:#3a2e22;font-size:14px;margin-top:8px;font-weight:600}
</style>
</head>
<body>
  <h3>v5 写实照片质感 · 平视陪伴 idle（hair light 分离 + 左右转头互动）</h3>
  <div class="sub">背景 = App 首页暖白底；脚下椭圆影 = 客户端程序化接触阴影（伪 3D 三件套）</div>
  <div class="row">
    <div>
      <div class="slot"><div class="shadow"></div><img src="pet1/anim_idle.webp"></div>
      <div class="name">🐶 狗（v5 写实 real_3）</div>
    </div>
    <div>
      <div class="slot"><div class="shadow"></div><img src="pet2/anim_idle.webp"></div>
      <div class="name">🐱 猫（v5 写实 real_2）</div>
    </div>
  </div>
</body>
</html>
