<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Seedream + Seedance Pet Demo</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #251d18;
      --muted: #7d7067;
      --line: rgba(50, 38, 30, .12);
      --paper: #f4eee6;
      --accent: #187a69;
      --warm: #a2674c;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      color: var(--ink);
      background: linear-gradient(135deg, #f7f1e9, #e9ded3);
      display: grid;
      place-items: center;
      padding: 28px;
    }

    .wrap {
      width: min(980px, 100%);
      display: grid;
      grid-template-columns: minmax(320px, 520px) minmax(280px, 1fr);
      gap: 22px;
      align-items: center;
    }

    .stage {
      position: relative;
      aspect-ratio: 1 / 1;
      border-radius: 8px;
      background:
        linear-gradient(45deg, rgba(80, 70, 62, .05) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(80, 70, 62, .05) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(80, 70, 62, .05) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(80, 70, 62, .05) 75%),
        #fffaf3;
      background-size: 28px 28px;
      background-position: 0 0, 0 14px, 14px -14px, -14px 0;
      border: 1px solid var(--line);
      box-shadow: 0 24px 68px rgba(52, 38, 29, .14);
      overflow: hidden;
    }

    .shadow {
      position: absolute;
      left: 50%;
      bottom: 42px;
      width: 48%;
      height: 34px;
      transform: translateX(-50%);
      border-radius: 50%;
      background: radial-gradient(ellipse at center, rgba(48, 34, 22, .22), transparent 70%);
      animation: breath 2.8s ease-in-out infinite;
    }

    @keyframes breath {
      0%, 100% { transform: translateX(-50%) scaleX(1); opacity: .78; }
      50% { transform: translateX(-50%) scaleX(1.08); opacity: .92; }
    }

    .pet {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      z-index: 1;
    }

    .panel {
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .78);
      padding: 18px;
      box-shadow: 0 16px 42px rgba(52, 38, 29, .10);
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.12;
      letter-spacing: 0;
    }

    .sub {
      margin: 9px 0 16px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin: 14px 0;
    }

    .metric {
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fffdf8;
      padding: 12px;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 4px;
    }

    .metric strong {
      font-size: 18px;
      line-height: 1.1;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 15px;
    }

    button, a.button {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      padding: 9px 13px;
      color: var(--ink);
      text-decoration: none;
      font: inherit;
      font-size: 13px;
      cursor: pointer;
    }

    button.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 700;
    }

    .note {
      margin-top: 14px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.7;
    }

    @media (max-width: 820px) {
      body { padding: 16px; }
      .wrap { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="stage" aria-label="pet animation">
      <div class="shadow"></div>
      <img class="pet" id="pet" src="pet1/anim_idle.webp" alt="pet idle animation" />
    </section>

    <section class="panel">
      <h1>Seedream + Seedance 跑通结果</h1>
      <p class="sub">流程：本地猫图 → Seedream 绿幕定稿 → Seedance 首尾帧 idle 视频 → ffmpeg 绿幕抠图 → 透明 WebP。</p>

      <div class="metrics">
        <div class="metric"><span>已生成动作</span><strong>idle</strong></div>
        <div class="metric"><span>透明动图</span><strong>60 帧</strong></div>
        <div class="metric"><span>WebP 体积</span><strong>2.20 MB</strong></div>
        <div class="metric"><span>绿残留</span><strong>0.0%</strong></div>
      </div>

      <div class="actions">
        <button class="active" data-clip="idle">idle</button>
        <button data-clip="touch">touch 待生成</button>
        <button data-clip="active">active 待生成</button>
        <button data-clip="sleep">sleep 待生成</button>
        <a class="button" href="pet1/raw_idle.mp4" target="_blank">查看原视频</a>
      </div>

      <p class="note">现在可以继续调 `prompts.py` 里的形象 prompt 和动作 prompt。补齐其他动作后，原包的 `demo.html` 状态机就能切换 touch/active/sleep。</p>
    </section>
  </main>

  <script>
    document.querySelectorAll("button[data-clip]").forEach((button) => {
      button.addEventListener("click", () => {
        const clip = button.dataset.clip;
        if (clip !== "idle") return;
        document.getElementById("pet").src = `pet1/anim_idle.webp?t=${Date.now()}`;
      });
    });
  </script>
</body>
</html>
